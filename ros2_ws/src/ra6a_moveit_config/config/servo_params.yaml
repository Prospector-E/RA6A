###############################################
# MoveIt Servo config — AR4-style for RA6A
###############################################

## Properties of outgoing commands
publish_period: 0.1  # 1/Nominal publish rate [seconds]
max_expected_latency: 0.2

command_in_type: "speed_units"
scale:
  linear: 0.4
  rotational: 0.8
  joint: 0.5

incoming_command_timeout: 0.5

# Output JointTrajectory to arm_controller (like AR4)
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false

## Smoothing
use_smoothing: true
# smoothing_filter_plugin_name: "online_signal_smoothing::AccelerationLimitedPlugin"

is_primary_planning_scene_monitor: false
check_octomap_collisions: false

## MoveIt properties
move_group_name: arm
planning_frame: base_link
ee_frame_name: end_effector
robot_link_command_frame: base_link

## Singularity — match AR4 values
lower_singularity_threshold: 200.0
hard_stop_singularity_threshold: 500.0
leaving_singularity_threshold_multiplier: 1.5

joint_limit_margins: [0.05]

## Topic names
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status
command_out_topic: /arm_controller/joint_trajectory

## Collision
check_collisions: false
collision_check_rate: 10.0
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02

halt_all_joints_in_cartesian_mode: false
